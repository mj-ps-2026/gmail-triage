name: Inbox Triage

on:
  schedule:
    - cron: "*/15 * * * *"   # archive-only, every 15 min
    - cron: "0 13 * * *"     # digest 9am ET (UTC-4), 12h lookback
    - cron: "0 19 * * *"     # digest 3pm ET, 6h lookback
    - cron: "0 1 * * *"      # digest 9pm ET, 6h lookback

  workflow_dispatch:
    inputs:
      send_digest:
        description: "Send digest email"
        required: false
        default: "false"
        type: boolean
      dry_run:
        description: "Dry run (classify only, no archiving or digest send)"
        required: false
        default: "false"
        type: boolean
      lookback_hours:
        description: "Custom lookback window in hours"
        required: false
        default: "1"
        type: string

jobs:
  triage:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Determine mode
        id: mode
        run: |
          SCHEDULE="${{ github.event.schedule }}"
          if [ -n "${{ github.event.inputs.lookback_hours }}" ]; then
            echo "hours=${{ github.event.inputs.lookback_hours }}" >> $GITHUB_OUTPUT
            echo "send_digest=${{ github.event.inputs.send_digest || 'false' }}" >> $GITHUB_OUTPUT
          elif [ "$SCHEDULE" = "0 13 * * *" ]; then
            echo "hours=12" >> $GITHUB_OUTPUT
            echo "send_digest=true" >> $GITHUB_OUTPUT
          elif [ "$SCHEDULE" = "0 19 * * *" ] || [ "$SCHEDULE" = "0 1 * * *" ]; then
            echo "hours=6" >> $GITHUB_OUTPUT
            echo "send_digest=true" >> $GITHUB_OUTPUT
          else
            echo "hours=0.5" >> $GITHUB_OUTPUT
            echo "send_digest=false" >> $GITHUB_OUTPUT
          fi

      - name: Run triage
        env:
          GMAIL_CLIENT_ID: ${{ secrets.GMAIL_CLIENT_ID }}
          GMAIL_CLIENT_SECRET: ${{ secrets.GMAIL_CLIENT_SECRET }}
          GMAIL_REFRESH_TOKEN: ${{ secrets.GMAIL_REFRESH_TOKEN }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          DIGEST_TO_EMAIL: ${{ secrets.DIGEST_TO_EMAIL }}
          LOOKBACK_HOURS: ${{ steps.mode.outputs.hours }}
          SEND_DIGEST: ${{ steps.mode.outputs.send_digest }}
          DRY_RUN: ${{ github.event.inputs.dry_run || 'false' }}
        run: node triage.js
